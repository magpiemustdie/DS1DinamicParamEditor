name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout SoulsFormatsNEXT
        uses: actions/checkout@v4
        with:
          repository: soulsmods/SoulsFormatsNEXT
          path: SoulsFormatsNEXT

      - name: Checkout PropertyHook
        uses: actions/checkout@v4
        with:
          repository: JKAnderson/PropertyHook
          path: PropertyHook

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0

      - run: dotnet build DS1DinamicParamEditor/DS1DinamicParamEditor.csproj -c Release

      - uses: actions/upload-artifact@v4
        with:
          name: DS1DPE
          path: DS1DinamicParamEditor/bin/Release/net9.0-windows/

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DS1DinamicParamEditor/bin/Release/net9.0-windows/DS1DPE.exe
